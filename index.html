<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ashken!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .birthday-container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .letter {
            display: inline-block;
            font-size: 4.5rem;
            font-weight: bold;
            background: linear-gradient(to right, #ff9a9e 0%, #fecfef 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fallIn 1s ease-out forwards, glow 2s ease-in-out infinite alternate;
            opacity: 0;
            transform: translateY(-100vh);
        }

        .wish-text {
            color: #5d5d5d;
            font-style: italic;
            max-width: 500px;
            margin: 30px auto;
            font-size: 1.3rem;
            line-height: 1.6;
            animation: fadeIn 4s ease-in forwards;
            opacity: 0;
        }

        .thanks-alisa {
            margin-top: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #888;
            animation: fadeIn 5s ease-in forwards;
            opacity: 0;
        }

        .surprise-btn {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 1.1rem;
            background: #ff9a9e;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }

        .surprise-btn:hover { transform: scale(1.1); background: #ff7b80; }

        
        #cakeWrapper {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            animation: popUp 0.5s ease-out;
        }

        #bigCake {
            font-size: 180px; 
        }

        #ageText {
            display: block;
            font-size: 4rem;
            font-weight: 900;
            color: #ff6b6b; 
            margin-top: -50px; 
            text-shadow: 0 0 10px #ff9a9e, 0 0 20px white;
            animation: flicker 1.5s infinite alternate; 
        }

        @keyframes popUp {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        @keyframes flicker {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.02); }
        }

        @keyframes fallIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes glow {
            from { text-shadow: 0 0 10px #ff9a9e; }
            to { text-shadow: 0 0 20px #fad0c4; }
        }

        .falling-item {
            position: absolute;
            top: -50px;
            z-index: 1;
            animation: itemFall linear infinite;
        }

        @keyframes itemFall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="birthday-container">
        <div id="happyBirthdayText"></div>
        
        <p class="wish-text">
            «Թող Ձեր կյանքի ամեն մի օրը լցված լինի այնպիսի լույսով ու ջերմությամբ, ինչպիսին Դուք եք տալիս մեզ։»
        </p>

        <p class="thanks-alisa">thank you Alisa for helping me</p>

        <button class="surprise-btn" onclick="startSurprise()">Սեղմիր այստեղ 🎁</button>
    </div>

    <div id="cakeWrapper">
        <div id="bigCake">🎂</div>
        <div id="ageText">38</div>
    </div>

    <script>
        const text = "Happy birthday Ashken";
        const container = document.getElementById('happyBirthdayText');

        function animateLetters() {
            for (let i = 0; i < text.length; i++) {
                const letterSpan = document.createElement('span');
                letterSpan.classList.add('letter');
                letterSpan.innerHTML = text[i] === ' ' ? '&nbsp;' : text[i];
                letterSpan.style.animationDelay = (i * 100) + 'ms';
                container.appendChild(letterSpan);
            }
        }
        animateLetters();

        function createFallingItem(isSurprise = false) {
            const item = document.createElement('div');
            item.classList.add('falling-item');
            const icons = isSurprise ? ['🎉', '🎊', '✨', '⭐'] : ['🎂', '🎈', '🎁', '💖'];
            item.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 2 + 2) + 's';
            item.style.fontSize = (Math.random() * 20 + 20) + 'px';
            document.body.appendChild(item);
            setTimeout(() => { item.remove(); }, 4000);
        }

        setInterval(() => createFallingItem(false), 300);

        function startSurprise() {
            
            const cakeWrapper = document.getElementById('cakeWrapper');
            cakeWrapper.style.display = 'block';
            
            
            for(let i = 0; i < 60; i++) {
                setTimeout(() => createFallingItem(true), i * 40);
            }

            
            setTimeout(() => { cakeWrapper.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
